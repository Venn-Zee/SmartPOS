<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SmartPOS Cafe & Retail</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- Floating beans decoration -->
<div class="coffee-beans">
  <span style="left:10%;animation-delay:0s;animation-duration:18s;">☕</span>
  <span style="left:30%;animation-delay:4s;animation-duration:22s;">🫘</span>
  <span style="left:55%;animation-delay:8s;animation-duration:16s;">☕</span>
  <span style="left:75%;animation-delay:2s;animation-duration:20s;">🫘</span>
  <span style="left:90%;animation-delay:12s;animation-duration:24s;">☕</span>
</div>

<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-icon">☕</div>
      <h1>SmartPOS</h1>
      <p>Cafe & Retail Management System</p>
    </div>

    {% if messages %}
      {% for message in messages %}
      <div class="alert alert-{{ message.tags }}" style="margin-bottom:16px;">
        <i class="fas fa-exclamation-circle"></i> {{ message }}
      </div>
      {% endfor %}
    {% endif %}

    <form method="POST" class="login-form" id="loginForm">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="id_username">
          <i class="fas fa-user" style="color:var(--caramel);margin-right:6px;"></i>Username
        </label>
        <input type="text" name="username" id="id_username" class="form-control" placeholder="Masukkan username" autofocus required>
      </div>
      <div class="form-group">
        <label class="form-label" for="id_password">
          <i class="fas fa-lock" style="color:var(--caramel);margin-right:6px;"></i>Password
        </label>
        <div style="position:relative;">
          <input type="password" name="password" id="id_password" class="form-control" placeholder="Masukkan password" required style="padding-right:42px;">
          <button type="button" onclick="togglePass()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:15px;" id="eyeBtn">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">
        <i class="fas fa-mug-hot"></i> &nbsp; Masuk ke SmartPOS
      </button>
    </form>

    <div style="text-align:center;margin-top:24px;font-size:12px;color:var(--text-muted);">
      ☕ Selamat datang, siapkan hari yang produktif!
    </div>
  </div>
</div>

<script>
function togglePass() {
  const p = document.getElementById('id_password');
  const btn = document.getElementById('eyeBtn');
  if (p.type === 'password') {
    p.type = 'text';
    btn.innerHTML = '<i class="fas fa-eye-slash"></i>';
  } else {
    p.type = 'password';
    btn.innerHTML = '<i class="fas fa-eye"></i>';
  }
}
</script>
</body>
</html>
